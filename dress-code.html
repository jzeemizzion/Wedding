<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dress Code | Messy & Cloyd Wedding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-blue: #8EB1D1;
      --dark-navy: #1C2B48;
      --off-white: #E8ECEF;
      --white: #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: 'Lato', sans-serif;
      color: var(--dark-navy);
      background: var(--off-white);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .dress-code-wrap {
      width: min(900px, 100%);
      background: var(--white);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(28, 43, 72, 0.12);
      text-align: center;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      margin-bottom: 16px;
      color: var(--dark-navy);
    }

    img {
      width: 100%;
      height: auto;
      border-radius: 10px;
      display: block;
    }

    .back-link {
      display: inline-block;
      margin-top: 16px;
      color: var(--primary-blue);
      text-decoration: none;
      font-weight: 700;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main class="dress-code-wrap">
    <h1>Dress Code</h1>
    <img src="assets/Dress Code.png" alt="Wedding dress code">
    <a class="back-link" href="index.html">← Back to Wedding Page</a>
  </main>
</body>
</html>
